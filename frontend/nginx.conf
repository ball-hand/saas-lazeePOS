# ──────────────────────────────────────────────────────────────
#  Nginx config untuk Frontend production (SPA React Router)
#  File ini di-copy ke dalam container frontend saat build
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression untuk performa lebih baik
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml application/json
               application/javascript image/svg+xml;

    # Cache static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA Fallback — semua route dikembalikan ke index.html
    # React Router yang handle routing di sisi client
    location / {
        try_files $uri $uri/ /index.html;
    }
}
