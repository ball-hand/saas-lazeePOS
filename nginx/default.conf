server {
    listen 80;
    # Tangkap domain utama dan semua subdomainnya
    server_name lazeepos.local *.lazeepos.local;

    # 1. Routing ke Backend API
    location /api/ {
        proxy_pass http://backend:5000; # Teruskan ke container backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host; # PENTING: Meneruskan nama subdomain ke Express
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Routing ke Frontend (React/Vite)
    location / {
        proxy_pass http://frontend:5173; # Teruskan ke container frontend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # PENTING: Untuk Hot-Reload Vite (WebSocket)
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}