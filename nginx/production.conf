# ──────────────────────────────────────────────────────────────
#  Nginx Reverse Proxy — Production
#  Digunakan bersama docker-compose.prod.yml
#
#  Untuk mengaktifkan HTTPS, ikuti langkah berikut setelah deploy:
#  1. Pasang Certbot: sudo apt install certbot python3-certbot-nginx
#  2. Jalankan: sudo certbot --nginx -d lazeepos.com -d www.lazeepos.com
#  3. Certbot akan otomatis update config ini dengan SSL
# ──────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS (aktifkan setelah dapat SSL cert)
# server {
#     listen 80;
#     server_name lazeepos.com *.lazeepos.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl;                         # Aktifkan setelah SSL
    server_name lazeepos.com *.lazeepos.com;

    # === SSL (uncomment setelah dapat cert dari Certbot) ===
    # ssl_certificate     /etc/letsencrypt/live/lazeepos.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/lazeepos.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ========================================================

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Max upload size (untuk media/foto produk)
    client_max_body_size 20M;

    # 1. Routing ke Backend API
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 2. Serve static files dari Frontend (Nginx dalam container frontend)
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
