version: '3.8'

services:
  # ── 1. MySQL 8.0 ───────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: pos_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--skip-password"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - lazee_network

  # ── 2. Nginx Reverse Proxy & Subdomain Router ───────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lazee_network

  # ── 3. Frontend (React + Vite) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    expose:
      - "5173"
    environment:
      - VITE_API_URL=http://lazeepos.local/api
    networks:
      - lazee_network

  # ── 4. Backend (Node.js + Express) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--experimental-modules
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-LAZEE_POS_SUPER_SECRET_KEY}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-}
      - DB_NAME=${DB_NAME:-pos_db}
      - DB_PORT=${DB_PORT:-3306}
      - DATABASE_URL=${DATABASE_URL:-mysql://root:@mysql:3306/pos_db}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lazee_network

volumes:
  mysql_data:

networks:
  lazee_network:
    driver: bridge
