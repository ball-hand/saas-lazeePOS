services:
  # ── 1. MySQL 8.0 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME:-pos_db}
    volumes:
      - mysql_data:/var/lib/mysql
    # Tidak expose port ke luar (keamanan)
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - lazee_network

  # ── 2. Redis Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - lazee_network

  # ── 3. Backend (Node.js Production) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "5000"
    env_file:
      # Di server production, buat file ini dari .env.production.example
      # Contoh: cp backend/.env.production.example backend/.env.production
      - path: ./backend/.env.production
        required: false
    environment:
      - NODE_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lazee_network

  # ── 4. Frontend (Nginx serving static React build) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
        - VITE_MIDTRANS_ENV=${MIDTRANS_ENV:-production}
        - VITE_MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
    restart: always
    expose:
      - "80"
    networks:
      - lazee_network

  # ── 5. Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment setelah dapat SSL cert dari Certbot:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lazee_network

volumes:
  mysql_data:
  redis_data:

networks:
  lazee_network:
    driver: bridge
